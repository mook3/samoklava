meta:
  engine: 4.1.0
  version: 0.0.1
  author: Henri Nurmi
units:
  $default_width: cx-1
  $default_height: cy-1
  $default_spread: cx
  $default_padding: cy
  kx: cx
  ky: cy
  px: kx + 2
  py: ky + 2
  index_stagger: -8.7
  arch_top_shift: 54
  arch_top_radius: 70
  arch_bottom_shift: 298.5
  arch_bottom_radius: 300
  arch_left_x: 290
  arch_left_y: 0
  arch_left_radius: 302
  arch_right_x: -200
  arch_right_y: 20
  arch_right_radius: 300
  mcu_shift_x: kx + 2
  mcu_shift_y: -13.5
  conn_cut_w: 50
  conn_cut_h: 50
  mounting_spacer_diameter: 3.1
  mounting_hole_diameter: 2.2
  reset_w: 3
  reset_h: 6
  trrs_w: 13
  trrs_h: 6
  mcu_w: 18
  mcu_h: 33
  trrs_shift_x: kx + 17
  trrs_shift_y: mcu_shift_y - 22.5
  reset_shift_x: kx + 13.6
  reset_shfit_y: trrs_shift_y - 6.5
  tenting_puck_shift_y: -ky/2 - 5.6
  logo_shift_y: -16.25
points:
  zones:
    matrix:
      key.tags: switch
      columns:
        pinky:
          rows:
            bottom:
              key_net: P6 
            home:
              key_net: P5
            top:
              key_net: P4
        ring:
          key.stagger: 13
          rows:
            bottom:
              key_net: P3
            home:
              key_net: P2
            top:
              key_net: P0
        middle:
          key.stagger: 6.7
          rows:
            bottom:
              key_net: P1
            home:
              key_net: P18
            top:
              key_net: P15
        index:
          key.stagger: index_stagger
          rows:
            bottom:
              key_net: P14
            home:
              key_net: P16
            top:
              key_net: P10
        inner:
          key.stagger: -3.5
          rows:
            bottom:
              key_net: P19
            home:
              key_net: P20
            top:
              key_net: P21
      # Fix placement on KiCAD sheet.
      anchor:
        shift: [50, -100]
    thumbs:
      key.tags: [switch, thumb]
      anchor:
        ref:
          ref: matrix_inner_bottom
          shift: [-kx/2, -ky/2]
          rotate: -10
        shift: [-2, -ky/2]
      columns:
        inner:
          key:
            key_net: P7
        home:
          key:
            # hinge at bottom-left corner of key
            origin: [-kx/2, -ky/2]
            splay: -8
            key_net: P8
        outer:
          key:
            # hinge at bottom-left corner of key
            origin: [-kx/2, -ky/2]
            splay: -8
            key_net: P9
      rows:
        cluster:
    thumb_pt:
      key:
        width: 2
        height: 2
      anchor:
        ref: matrix_inner_bottom
        shift: [kx/2, -ky/2 - 4]
      columns:
        c:
      rows:
        r:
    reset_ttrs_pt:
      key:
        width: 2
        height: 2
        spread: reset_w/2 + trrs_w/2 + 1
      anchor:
        ref:  thumb_pt_c_r
        shift: [reset_w/2, trrs_h/2]
      columns:
        reset:
        trrs:
      rows:
        r:
    mcu_pt:
      key:
        width: 2
        height: 2
      anchor:
        ref: reset_ttrs_pt_reset_r
        shift: [-reset_w/2 + mcu_w / 2, trrs_h / 2 + mcu_h/2 + 1]
      columns: 
        c:
      rows:
        r:
    mounting_left:
      key:
        width: 2
        height: 2
        tags: mount
        padding: 2ky
      anchor:
        ref: matrix_pinky_bottom
        shift: [kx/2, ky/2]
      columns:
        c1:
      rows:
        r1:
        r2:
    mounting_right:
      key:
        width: 2
        height: 2
        tags: mount
        padding: 3ky
      anchor:
        ref: matrix_inner_bottom
        shift: [-kx/2, -ky/2]
      columns:
        c1:
      rows:
        r1:
        r2:
    mounting_thumb:
      key:
        width: 2
        height: 2
        tags: mount
      anchor:
        ref: thumbs_outer_cluster
        shift: [-kx/2 - 2, ky/2 + 2]
      columns:
        c1:
      rows:
        r1:
outlines:
  keys:
    - what: rectangle
      where: [switch]
      size: [kx-1, ky-1]
  _thumbs:
    - what: rectangle
      where: [thumb]
      size: [kx, ky]
  # MCU
  _mcu:
    - what: rectangle
      size: [mcu_w, mcu_h]
      where: mcu_pt_c_r
  _top_arch_circle_left:
    - what: circle
      radius: arch_top_radius
      where:
        ref:
          aggregate.parts:
            - ref: matrix_pinky_top
              orient: 0
              shift: [-kx/2, ky/2]
            - ref: matrix_inner_top
              orient: 0
              shift: [kx/2, ky/2]
          orient:
            ref: matrix_pinky_top
            shift: [-kx/2, ky/2]
        orient: 90
        shift: [0, arch_top_shift]
  _bottom_arch_circle_left:
    - what: circle
      radius: arch_bottom_radius
      where:
        ref:
          aggregate.parts:
            - ref: matrix_pinky_bottom
              shift: [-kx/2, -ky/2]
            - ref: thumbs_inner_cluster
              shift: [-kx/2, -ky/2]
          orient:
            ref: matrix_pinky_bottom
            shift: [-kx/2, -ky/2]
        orient: 90
        shift: [0, arch_bottom_shift]
  _left_rect_to_subtract_left:
    - what: rectangle
      size: 10 * cx
      where:
        ref: matrix_pinky_home
        shift: [-kx/2 - sx/2, 0]
  _right_rect_to_subtract_left:
    - what: rectangle
      size: 10 * cx
      where:
        ref: mcu_pt_c_r
        shift: [mcu_w/2 + sx/2, 0]
   #_thumb_poly_left:
   # - what: poly
   #   points:
   #     - ref: thumbs_outer_cluster
   #       orient: -26 # add first thumb orient and next 2's splays together
   #       shift: [-kx/2, ky/2]
   #     - ref: thumbs_outer_cluster
   #       orient: -26 # add first thumb orient and next 2's splays together
   #       shift: [kx/2, ky/2]
   #   where:
   #     ref: mcu_pt_c_r
   #     shift: [mcu_w/2 + sx/2, 0]
  _right_arch_circle_left:
    - what: circle
      radius: arch_right_radius
      where:
        ref: matrix_middle_bottom
        shift: [arch_right_x, arch_right_y]
  _arches_left:
    [
      +_top_arch_circle_left,
      -_bottom_arch_circle_left,
      -_left_rect_to_subtract_left,
      +_mcu,
      -_right_rect_to_subtract_left,
      +_thumbs
      #~_right_arch_circle_left,
    ]
  # TODO Needs to reference _mcu
  _conn_cut_left:
    - what: rectangle
      size: [conn_cut_w, conn_cut_h]
      where:
        ref: mcu_pt_c_r
        shift: [-mcu_w/2 + conn_cut_w/2, mcu_h/2 + conn_cut_h/2]
  _reset:
    - what: rectangle
      size: [reset_w, reset_h]
      where: reset_ttrs_pt_reset_r
  _trrs:
    - what: rectangle
      size: [trrs_w, trrs_h]
      where: reset_ttrs_pt_trrs_r
  # Mounting holes
  _mounting_holes:
    - what: circle
      radius: mounting_hole_diameter/2
      where: mount
  # Board outlines
  _board_outline_left:
    - what: outline
      name: _arches_left
      fillet: 3
  board_left:
    [ _board_outline_left,-_conn_cut_left, -_mounting_holes]
  board_pcb_left:
    [ _board_outline_left,-_conn_cut_left]
  # Switch plate
  _mcu_cutout:
    - what: rectangle
      size: [30, 60]
      where:
        ref: matrix_inner_bottom
        shift: [0.5kx + 30/2 + 0.5, -0.5ky + 60/2 + 0.5]
  _switch_cutouts:
    - what: rectangle
      where: [switch]
      asym: source
      size: 14
      bound: false
  switch_plate:
    [_board_outline_left, -_switch_cutouts, -_mcu_cutout]
  switch_plate_with_mounting:
    [switch_plate, -_mounting_holes]
  # Debug outlines
  _debug:
    - name: board_pcb_left
    - operation: stack
      name: keys
  _debug2:
    - name: _trrs
    - operation: stack
      name: _debug
  _debug3:
    - name: _mcu
    - operation: stack
      name: _debug2
  _debug4:
    - name: _reset
    - operation: stack
      name: _debug3
  debug:
    - name: _mounting_holes
    - operation: stack
      name: _debug4
pcbs:
  board:
    template: kicad8
    outlines:
      main:
        outline: board_pcb_left
    footprints:
      switch:
        what: choc
        where: [[-/^mirror_.*/, switch]]
        adjust:
          rotate: 180
        params:
          from: "{{key_net}}"
          to: GND
          hotswap: true
          keycaps: true
      promicro:
        what: promicro_custom
        where:
          ref: mcu_pt_c_r
          rotate: -90
        params:
          orientation: down
      trrs:
        what: trrs
        where:
          ref: reset_ttrs_pt_trrs_r
          rotate: -90
        params:
          A: VCC
          B: DATA
          C: GND
          D: ''
      reset:
        what: reset_button
        where:
          ref: reset_ttrs_pt_reset_r
          rotate: -90
      zone_front:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: VCC
          side: F
          width: 8.5kx
          height: 6.5ky
      zone_back:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: GND
          side: B
          width: 8.5kx
          height: 6.5ky
      mounting:
        what: mounting_hole_plated
        where: [[-/^mirror_.*/, mount]]
        params.drill: mounting_spacer_diameter
  top_plate:
    template: kicad8
    outlines:
      main:
        outline: switch_plate
    footprints:
      mounting:
        what: mounting_hole_npth
        where: [[-/^mirror_.*/, mount]]
        params.hole_size: mounting_hole_diameter
        params.hole_drill: mounting_hole_diameter
      zone_front:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: ''
          side: F
          width: 8.5kx
          height: 6.5ky
      zone_back:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: ''
          side: B
          width: 8.5kx
          height: 6.5ky
  bottom_plate:
    template: kicad8
    outlines:
      main:
        outline: _board_outline_left
    footprints: &bottom_footprints
      mounting:
        what: mounting_hole_npth
        where: [[-/^mirror_.*/, mount]]
        params.hole_size: mounting_hole_diameter
        params.hole_drill: mounting_hole_diameter
      zone_front:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: ''
          side: F
          width: 8.5kx
          height: 6.5ky
      zone_back:
        what: zone
        where:
          ref: matrix_pinky_top
          shift: [-1kx, 1.2ky]
        params:
          net: ''
          side: B
          width: 8.5kx
          height: 6.5ky

